<div class="container register-container">
    <div class="row justify-content-center align-items-center w-100">
        <div class="col-12 col-lg-10">
            <div class="card shadow-lg overflow-hidden" style="border-radius: 1rem;">
                <div class="row g-0">
                    <!-- Image Section (Left) -->
                    <div class="col-md-6 d-none d-md-block">
                        <div class="h-100 w-100"
                            style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('register.jpg'); background-size: cover; background-position: center; min-height: 500px;">
                        </div>
                    </div>

                    <!-- Register Section (Right) -->
                    <div class="col-md-6 d-flex flex-column justify-content-center">
                        <div class="card-body bg-dark text-white p-5 border-0">
                            <h3 class="card-title text-center mb-4">Registro</h3>
                            <form (poster)="onSubmit()">
                                <div *ngIf="mensaje" class="alert alert-danger mb-3" role="alert">
                                    {{ mensaje }}
                                </div>
                                <div class="form-group mb-3">
                                    <label for="email" class="form-label">Correo Electrónico</label>
                                    <input type="email" class="form-control form-control-lg" id="email"
                                        [(ngModel)]="email" name="email" placeholder="Ingrese su correo" required>
                                </div>
                                <div class="form-group mb-4">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control form-control-lg" id="password"
                                        [(ngModel)]="password" name="password" placeholder="Ingrese su contraseña"
                                        required>
                                </div>
                                <button type="submit" (click)="onSubmit()"
                                    class="btn btn-primary btn-lg w-100 mt-2">Registrarse</button>
                                <p class="text-center mt-3 mb-0 fs-5">¿Ya tienes una cuenta? <a href="/login"
                                        class="text-primary text-decoration-none">Inicia sesión</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
