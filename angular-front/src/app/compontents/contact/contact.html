<div class="container my-5">
    <div class="row">
        <div class="col-12 text-center fondo-anime">
            <h1 class="display-4 fw-bold">Contactanos</h1>
            <p class="lead fw-bold">¿Tienes alguna solicitud o deseas que hagamos un pedido?</p>
        </div>
    </div>
    <div class="container mt-5">
        <h2 style="color: #fff;">Contáctanos</h2>
        <form>
            <div class="mb-3"> <label for="name" class="form-label">Nombre completo</label> <input type="text"
                    class="form-control" id="name" placeholder="Tu nombre"> </div>
            <div class="mb-3"> <label for="email" class="form-label">Correo electrónico</label> <input type="email"
                    class="form-control" id="email" placeholder="tu@email.com"> </div>
            <div class="mb-3"> <label for="order" class="form-label">Número de pedido (opcional)</label> <input
                    type="text" class="form-control" id="order" placeholder="#0000"> </div>
            <div class="mb-3"> <label for="message" class="form-label">Mensaje</label> <textarea class="form-control"
                    id="message" rows="4"></textarea> </div> <button type="submit" class="btn btn-primary">Enviar
                mensaje</button>
        </form>
    </div>


</div>
